name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle Build Files
      run: |
        # মেইন বিল্ড ফাইল তৈরি
        echo "plugins { id 'com.android.application' version '8.1.1' apply false }" > build.gradle
        echo "include ':app'" > settings.gradle
        
        # app ফোল্ডারের বিল্ড ফাইল তৈরি
        mkdir -p app
        cat << 'EOF' > app/build.gradle
        plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.tanjil.hud'
            compileSdk 34
            defaultConfig {
                applicationId "com.tanjil.hud"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
        }
        EOF
        
    - name: Build Android APK
      run: |
        gradle wrapper --gradle-version 8.1.1
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: FF-Fire-HUD-APK
        path: app/build/outputs/apk/debug/*.apk
