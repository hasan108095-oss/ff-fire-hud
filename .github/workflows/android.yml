name: Android APK Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Full Gradle Android Environment
      run: |
        # ১. গিটহাবের সার্ভারে অ্যান্ড্রয়েড SDK লাইসেন্স অটো-অ্যাকসেপ্ট করা
        mkdir -p "$ANDROID_HOME/licenses"
        echo "24a33b117b51e9745b28d195df277b4489eff1d1" > "$ANDROID_HOME/licenses/android-sdk-license"
        
        # ২. প্রজেক্টের মেইন সেটিংস ফাইল তৈরি
        cat << 'EOF' > settings.gradle
        pluginManagement {
            repositories {
                google()
                mavenCentral()
                gradlePluginPortal()
            }
        }
        dependencyResolutionManagement {
            repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.name = "FF-Fire-HUD"
        include ':app'
        EOF
        
        # ৩. মেইন বিল্ড গাইড ফাইল তৈরি
        cat << 'EOF' > build.gradle
        buildscript {
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:8.1.1'
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        EOF
        
        # ৪. গ্লেডল প্রোপার্টিজ ফাইল তৈরি (মেমোরি প্রবলেম এড়াতে)
        echo "org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m" > gradle.properties
        echo "android.useAndroidX=true" >> gradle.properties
        
        # ৫. app ফোল্ডারের আসল বিল্ড স্ক্রিপ্ট তৈরি
        mkdir -p app
        cat << 'EOF' > app/build.gradle
        apply plugin: 'com.android.application'

        android {
            namespace 'com.tanjil.hud'
            compileSdk 34
            
            defaultConfig {
                applicationId "com.tanjil.hud"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0"
            }
            
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }

        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.9.0'
        }
        EOF
        
    - name: Run Build Core
      run: |
        gradle wrapper --gradle-version 8.1.1
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: FF-Fire-HUD-APK
        path: app/build/outputs/apk/debug/*.apk
